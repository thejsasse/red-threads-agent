});

// ─── EXTRACT ISSUE REFERENCES ────────────────────────────────────────────────
function extractIssueRefs(text) {
  console.log('🔍 Extracting issue refs from:', text);
  const refs = [];
  
  // Look for title patterns in the text that match our verified issues
  const issueKeys = Object.keys(ISSUE_DATA);
  
  for (const slug of issueKeys) {
    const issue = ISSUE_DATA[slug];
    const title = issue.title;
    
    // Check if the title (or parts of it) appear in the text
    const titleWords = title.toLowerCase();
    const textLower = text.toLowerCase();
    
    // Look for exact title matches or key phrases
    if (textLower.includes(titleWords) || 
        textLower.includes(title.toLowerCase()) ||
        (title.includes('&') && textLower.includes(title.replace('&', 'and').toLowerCase())) ||
        (title.includes('?') && textLower.includes(title.replace('?', '').toLowerCase()))) {
      refs.push(slug);
    }
  }
  
  console.log('📋 Found issue references:', refs);
  return refs;
}

// ─── ADD MESSAGE ──────────────────────────────────────────────────────────────
function addMessage(sender, text) {
  const row = document.createElement('div');
  row.className = `msg-row ${sender}`;
  
  const avatar = document.createElement('div');
  avatar.className = `avatar ${sender}`;
  avatar.textContent = sender === 'user' ? 'You' : 'RT';
  
  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender}`;

  if (sender === 'agent') {
    console.log('Processing agent message:', text);
    
    // Look for issue references in the text
    const issueRefs = extractIssueRefs(text);
    
    // Clean up the text (remove any leftover ISSUE_CARDS lines)
    const cleanText = text.replace(/ISSUE_CARDS:.*$/gm, '').trim();
    
    // Add main text
    const lines = cleanText.split('\n')
      .filter(line => line.trim())
      .filter(line => !line.includes('ISSUE_CARDS:'));
    
    lines.forEach((line, i) => {
      const p = document.createElement('p');
      p.textContent = line;
      bubble.appendChild(p);
    });

    // Add issue cards if we found any references
    if (issueRefs.length > 0) {
      console.log('✅ Rendering', issueRefs.length, 'issue cards for:', issueRefs);
      const cardsDiv = document.createElement('div');
      cardsDiv.className = 'issue-cards';
      
      issueRefs.forEach(slug => {
        const issue = ISSUE_DATA[slug];
        if (!issue) return;
        
        console.log(`Rendering issue card for ${slug}:`, issue);
        const card = document.createElement('a');
        card.className = 'issue-card';
        card.href = issue.url;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        
        card.innerHTML = `
          <div class="issue-num">RT</div>
          <div class="issue-info">
            <div class="issue-title">${issue.title}</div>
            <div class="issue-tags">${issue.tags.map(t => `<span class="issue-tag">${t}</span>`).join('')}</div>
            <div class="issue-read">Read →</div>
          </div>`;
        cardsDiv.appendChild(card);
      });
      bubble.appendChild(cardsDiv);
      console.log('✅ Issue cards appended to bubble');
    } else {
      console.log('No issue references found in text');
    }
  } else {
    bubble.textContent = text;
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row agent';
  row.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar agent';
  avatar.textContent = 'RT';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(avatar);
  row.appendChild(typing);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ─── CLEAR CONVERSATION ───────────────────────────────────────────────────────
function clearConversation() {
  conversation = [];
  messagesEl.innerHTML = '';
  suggestionsEl.style.display = 'flex';
  errorNote.style.display = 'none';
  setTimeout(() => {
    const greeting = `I'm the Red Threads AI, built on the strategic insights from Jaime Solis's weekly newsletter about turning expertise into business. 

Red Threads isn't about more content. It's about smarter content that works as hard as you do.

Whether you're stuck on the content treadmill, trying to find your voice in a crowded market, or wondering when to invest in brand development, I'm here to help you find your Red Thread — the logic that connects what you know to what your audience needs.

What content or brand challenge are you working through?`;
    addMessage('agent', greeting);
    conversation.push({ role: 'assistant', content: greeting });
  }, 200);
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  suggestionsEl.style.display = 'none';
  errorNote.style.display = 'none';

  inputEl.value = '';
  autoResize();
  sendBtn.disabled = true;
  charCount.textContent = '';

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });

  isLoading = true;
  addTyping();

  try {
    const response = await fetch('https://icy-darkness-5ce3.jsasse-5c6.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversation
      })
    });

    removeTyping();

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const reply = data.content?.[0]?.text || "I hit a snag on my end — try again in a moment.";

    addMessage('agent', reply);
    conversation.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    console.error('Red Threads AI error:', err);
    errorNote.textContent = `Something went wrong: ${err.message}. Check your connection and try again.`;
    errorNote.style.display = 'block';
    conversation.pop();
  }

  isLoading = false;
  // Only auto-focus on desktop — on mobile this triggers the keyboard
  // which covers the response the user just received
  if (!('ontouchstart' in window)) {
    inputEl.focus();
  }
}
