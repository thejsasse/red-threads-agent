## CORE RED THREADS FRAMEWORKS

### The Red Thread
The logical connection between what you know (expertise), how you communicate (voice), and what your audience lacks (market gap). Not random content acts, but unified strategic narrative.

### The Brand Clock (Issue: Feb 6, 2026)
Maps business maturity to branding actions. Don't invest in "identity" before "proof of concept." Timing framework for marketing spend and brand development based on where you are in your business journey.

### Three-Piece Marketing (Issue: Aug 8, 2025)
1. Foundation (long-form content that demonstrates expertise)
2. Fragments (social/short-form distribution across channels) 
3. Friction (clear call to action that moves people toward business outcome)

Every prospect must clear three barriers:
1. Awareness (do they know you exist?)
2. Relevance (do they believe you can help them?)
3. Trust (do they believe you will help them?)

Two critical questions before any project:
- "Who is this for?"

// ─── INPUT HANDLING ───────────────────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  autoResize();
  const len = inputEl.value.length;
  sendBtn.disabled = len === 0;
  charCount.textContent = len > 1800 ? `${len}/2000` : '';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// Add missing click handler for send button
sendBtn.addEventListener('click', (e) => {
  console.log('Send button clicked', { disabled: sendBtn.disabled, text: inputEl.value });
  if (!sendBtn.disabled) {
    sendMessage();
  }
});

// Add touch event handling for mobile compatibility
sendBtn.addEventListener('touchend', (e) => {
  e.preventDefault(); // Prevent double-firing with click event
  console.log('Send button touched', { disabled: sendBtn.disabled, text: inputEl.value });
  if (!sendBtn.disabled) {
    sendMessage();
  }
});

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
}

// ─── EXTRACT ISSUE REFERENCES ────────────────────────────────────────────────
function extractIssueRefs(text) {
  console.log('🔍 Extracting issue refs from:', text);
  const refs = [];
  const textLower = text.toLowerCase();
  
  // Look for exact title matches first
  const issueKeys = Object.keys(ISSUE_DATA);
  for (const slug of issueKeys) {
    const issue = ISSUE_DATA[slug];
    const title = issue.title.toLowerCase();
    
    if (textLower.includes(title) || 
        (title.includes('&') && textLower.includes(title.replace('&', 'and'))) ||
        (title.includes('?') && textLower.includes(title.replace('?', '')))) {
      refs.push(slug);
    }
  }
  
  // Look for concept matches to map to verified issues
  const conceptMaps = {
    'content treadmill': 'stuck-inside',
    'content assets': 'stuck-inside', 
    'posting daily': 'stuck-inside',
    'not seeing results': 'getting-unstuck',
    'stalled progress': 'getting-unstuck',
    'brand timing': 'the-brand-clock',
    'when to invest': 'the-brand-clock',
    'podcast decision': 'should-you-have-a-podcast',
    'media format': 'should-you-have-a-podcast',
    'ai proof': 'the-ai-proof-brand-skill',
    'storytelling': 'the-ai-proof-brand-skill'
  };
  
  for (const [phrase, slug] of Object.entries(conceptMaps)) {
    if (textLower.includes(phrase) && !refs.includes(slug)) {
      refs.push(slug);
    }
  }
  
  console.log('📋 Found issue references:', refs);
  return refs;
}

// ─── ADD MESSAGE ──────────────────────────────────────────────────────────────
function addMessage(sender, text) {
  const row = document.createElement('div');
  row.className = `msg-row ${sender}`;
  
  const avatar = document.createElement('div');
  avatar.className = `avatar ${sender}`;
  avatar.textContent = sender === 'user' ? 'You' : 'RT';
  
  const bubble = document.createElement('div');
  bubble.className = `bubble ${sender}`;

  if (sender === 'agent') {
    console.log('Processing agent message:', text);
    
    // Look for issue references in the text
    const issueRefs = extractIssueRefs(text);
    
    // Clean up the text and format properly
    const cleanText = text
      .replace(/ISSUE_CARDS:.*$/gm, '')
      .replace(/\*\*(.*?)\*\*/g, '$1') // Remove ** emphasis for cleaner reading
      .replace(/\*([^*]+)\*/g, '$1')   // Remove single * emphasis  
      .trim();
    
    // Split into paragraphs and format cleanly
    const paragraphs = cleanText.split('\n')
      .filter(line => line.trim())
      .filter(line => !line.includes('ISSUE_CARDS:'));
    
    paragraphs.forEach((paragraph, i) => {
      const p = document.createElement('p');
      p.style.marginBottom = i === paragraphs.length - 1 ? '0' : '12px';
      p.textContent = paragraph;
      bubble.appendChild(p);
    });

    // Add issue cards if we found any references
    if (issueRefs.length > 0) {
      console.log('✅ Rendering', issueRefs.length, 'issue cards for:', issueRefs);
      const cardsDiv = document.createElement('div');
      cardsDiv.className = 'issue-cards';
      
      issueRefs.forEach(slug => {
        const issue = ISSUE_DATA[slug];
        if (!issue) return;
        
        console.log(`Rendering issue card for ${slug}:`, issue);
        const card = document.createElement('a');
        card.className = 'issue-card';
        card.href = issue.url;
        card.target = '_blank';
        card.rel = 'noopener noreferrer';
        
        card.innerHTML = `
          <div class="issue-num">RT</div>
          <div class="issue-info">
            <div class="issue-header">
              <span class="issue-title">${issue.title}</span>
              ${issue.tags.map(t => `<span class="issue-tag">${t}</span>`).join('')}
            </div>
            <div class="issue-read">Read →</div>
          </div>`;
        cardsDiv.appendChild(card);
      });
      bubble.appendChild(cardsDiv);
      console.log('✅ Issue cards appended to bubble');
    } else {
      console.log('No issue references found in text');
    }
  } else {
    bubble.textContent = text;
  }

  row.appendChild(avatar);
  row.appendChild(bubble);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function addTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row agent';
  row.id = 'typing-indicator';
  const avatar = document.createElement('div');
  avatar.className = 'avatar agent';
  avatar.textContent = 'RT';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(avatar);
  row.appendChild(typing);
  messagesEl.appendChild(row);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing-indicator');
  if (t) t.remove();
}

// ─── CLEAR CONVERSATION ───────────────────────────────────────────────────────
function clearConversation() {
  conversation = [];
  messagesEl.innerHTML = '';
  suggestionsEl.style.display = 'flex';
  errorNote.style.display = 'none';
  setTimeout(() => {
    const greeting = `I'm here to help you find the right Red Threads newsletter issue for whatever challenge you're facing.

Jaime writes about ideas from unexpected places that change how you see your work. My goal is simple: understand where you are, recommend 1-2 relevant issues, and get you reading the insights that matter most for your situation.

What's the challenge you're working through right now?`;
    addMessage('agent', greeting);
    conversation.push({ role: 'assistant', content: greeting });
  }, 200);
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  suggestionsEl.style.display = 'none';
  errorNote.style.display = 'none';

  inputEl.value = '';
  autoResize();
  sendBtn.disabled = true;
  charCount.textContent = '';

  addMessage('user', text);
  conversation.push({ role: 'user', content: text });

  isLoading = true;
  addTyping();

  try {
    const response = await fetch('https://icy-darkness-5ce3.jsasse-5c6.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM_PROMPT,
        messages: conversation
      })
    });

    removeTyping();

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      throw new Error(err.error?.message || `HTTP ${response.status}`);
    }

    const data = await response.json();
    const reply = data.content?.[0]?.text || "I hit a snag on my end — try again in a moment.";

    addMessage('agent', reply);
    conversation.push({ role: 'assistant', content: reply });

  } catch (err) {
    removeTyping();
    console.error('Red Threads AI error:', err);
    errorNote.textContent = `Something went wrong: ${err.message}. Check your connection and try again.`;
    errorNote.style.display = 'block';
    conversation.pop();
  }

  isLoading = false;
  // Only auto-focus on desktop — on mobile this triggers the keyboard
  // which covers the response the user just received
  if (!('ontouchstart' in window)) {
    inputEl.focus();
  }
}
